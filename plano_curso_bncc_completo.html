  /* Nível o  — sub-subitem */

  .l2 > li { position: relative; padding: 2px 0 2px 18px; font-size: 12px; line-height: 1.5; color: #9090b0; }
  .l2 > li::before { content: 'o'; position: absolute; left: 1px; color: #555575; font-size: 10px; line-height: 1.7; font-style: italic; }

  /* Nível ➢  — sub-sub-subitem */

  .l3 > li { position: relative; padding: 2px 0 2px 16px; font-size: 11.5px; line-height: 1.5; color: #787898; }
  .l3 > li::before { content: '›'; position: absolute; left: 2px; color: #444466; font-size: 13px; line-height: 1.35; }

  .l4 > li { position: relative; padding: 1px 0 1px 14px; font-size: 11px; line-height: 1.5; color: #666686; }

<script>
// Helper: monta li hierárquico a partir de estrutura de objetos
// Estrutura de cada item:
//   string => <li> simples
//   { t, c } => <li>t + lista filhos c[]</li>

function buildList(items, level) {
  if (!items || !items.length) return '';
  const cls = 'l' + level;
  let html = `<ul class="${cls}">`;
  for (const item of items) {
    if (typeof item === 'string') {
      html += `<li>${item}</li>`;
    } else {
      // { t: texto, c: filhos }
      const children = item.c ? buildList(item.c, level + 1) : '';
      html += `<li>${item.t}${children}</li>`;
    }
  }
  html += '</ul>';
  return html;
}

      'Diferentes concepções de liberdade na sociedade: determinismo contemporâneo e empreendedorismo, autonomia, cooperação e solidariedade;',
      'Formas e dimensões da violência: física, psicológica e simbólica;',
      'Movimentos sociais urbanos: grupos marginalizados (indígenas, afrodescendentes, deficientes, entre outros), políticas públicas (redistributivas de renda, ações afirmativas, cotas).',
    ]},
  ]
},

}; // fim DATA

// ═══════════ ESTRUTURA ═══════════
const AREAS = [
  { id: 'linguagens', label: 'Linguagens e suas Tecnologias', badge: 'badge-linguagens', color: '#7c4dff' },
  { id: 'mat',        label: 'Matemática e suas Tecnologias',          badge: 'badge-mat',       color: '#00bcd4' },
  { id: 'ciencias',   label: 'Ciências da Natureza e suas Tecnologias', badge: 'badge-ciencias',  color: '#4caf50' },
  { id: 'humanas',    label: 'Ciências Humanas e Sociais Aplicadas',    badge: 'badge-humanas',   color: '#ff7043' },
];

let currentYear = 1;
let currentSubject = null;

function subsByYear(y) {
  return Object.entries(DATA).filter(([,v]) => v.years.includes(y));
}
function areaOf(id) { return AREAS.find(a => a.id === DATA[id].area); }

function setYear(y) {
  currentYear = y;
  currentSubject = null;
  document.querySelectorAll('.year-btn').forEach((b,i) => b.classList.toggle('active', i+1===y));
  renderSidebar(); renderContent();
}

function renderSidebar() {
  const el = document.getElementById('sidebar');
  const subs = subsByYear(currentYear);
  let html = '';
  AREAS.forEach(area => {
    const as = subs.filter(([,v]) => v.area === area.id);
    if (!as.length) return;
    html += `<div class="area-section"><div class="area-label">${area.label}</div>`;
    as.forEach(([id, sub]) => {
      html += `<button class="subject-btn${currentSubject===id?' active':''}" onclick="selectSubject('${id}')">
        <span class="subject-dot" style="background:${area.color}${currentSubject===id?`;box-shadow:0 0 7px ${area.color}`:''}"></span>
        ${sub.label}
      </button>`;
    });
    html += '</div>';
  });
  el.innerHTML = html;
}

function selectSubject(id) {
  currentSubject = id;
  renderSidebar(); renderContent();
}

function renderContent() {
  const el = document.getElementById('contentArea');
  if (!currentSubject) {
    el.innerHTML = `<div class="placeholder"><div class="placeholder-icon">📚</div><p class="placeholder-text">Selecione uma disciplina no menu lateral para exibir todos os Objetos de Conhecimento</p></div>`;
    return;
  }
  const sub = DATA[currentSubject];
  const area = areaOf(currentSubject);

  const blocksHtml = sub.blocks.map((b, bi) => {
    const body = buildList(b.items, 0);
    return `<div class="block open" id="blk${bi}">
      <div class="block-header" onclick="this.parentElement.classList.toggle('open')">
        <span class="block-title">${b.title}</span>
        <span class="block-toggle">▾</span>
      </div>
      <div class="block-body">${body}</div>
    </div>`;
  }).join('');

  el.innerHTML = `
    <div class="content-header">
      <span class="content-area-badge ${area.badge}">${area.label}</span>
      <div class="content-title">${sub.label}</div>
      <span class="content-year-tag">
        <span style="width:7px;height:7px;border-radius:50%;background:${area.color};display:inline-block"></span>
        ${currentYear}ª Série &middot; Objetos de Conhecimento
      </span>
    </div>
    <div class="content-blocks">${blocksHtml}</div>`;
}

renderSidebar();
renderContent();
</script>
</body>
</html>
